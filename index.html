<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>仙境傳說：簡易版</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      color: #1f2937;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1, h2 {
      text-align: center;
      margin-bottom: 10px;
    }
    button {
      padding: 6px 12px;
      margin: 4px;
      border: none;
      border-radius: 4px;
      background-color: #3b82f6;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #2563eb;
    }
    /* 將屬性點數的加減按鈕做大一點，方便點擊 */
    .stat-row button {
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 20px;
    }
    .stat-row {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .stat-row label {
      width: 60px;
    }
    .stat-row span {
      width: 50px;
      text-align: center;
      font-weight: bold;
    }
    #log {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 10px;
      height: 220px;
      overflow-y: auto;
      font-size: 13px;
      margin-top: 10px;
      white-space: pre-wrap;
    }
    #playerInfo p {
      margin: 4px 0;
    }

    /* 卡片顯示樣式 */
    .card {
      display: inline-block;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 6px 10px;
      margin: 4px;
      background: #fefce8;
      font-size: 12px;
    }
    #cardCollection {
      padding: 4px 0;
    }
    #chatLog {
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <!-- 裝飾用標題圖片 -->
  <div class="container">
    <img src="ragnarok_header.png" alt="仙境傳說裝飾圖" style="max-width:100%; border-radius:12px; margin-bottom:16px;">
  </div>
  <div id="create" class="container">
    <h1>仙境傳說：簡易放置版</h1>
    <p>請選擇你的職業並分配能力值：</p>
    <select id="classSelect">
      <option value="swordsman">劍士</option>
      <option value="magician">魔法師</option>
      <option value="acolyte">服事</option>
      <option value="thief">盜賊</option>
      <option value="archer">弓箭手</option>
      <option value="merchant">商人</option>
    </select>
    <div id="stats">
      <p>可用點數: <span id="points">5</span></p>
      <div class="stat-row">
        <label>力量</label>
        <button onclick="adjustStat('str', -1)">-</button>
        <span id="str">1</span>
        <button onclick="adjustStat('str', 1)">+</button>
      </div>
      <div class="stat-row">
        <label>敏捷</label>
        <button onclick="adjustStat('dex', -1)">-</button>
        <span id="dex">1</span>
        <button onclick="adjustStat('dex', 1)">+</button>
      </div>
      <div class="stat-row">
        <label>體質</label>
        <button onclick="adjustStat('con', -1)">-</button>
        <span id="con">1</span>
        <button onclick="adjustStat('con', 1)">+</button>
      </div>
      <div class="stat-row">
        <label>智力</label>
        <button onclick="adjustStat('int', -1)">-</button>
        <span id="int">1</span>
        <button onclick="adjustStat('int', 1)">+</button>
      </div>
      <div class="stat-row">
        <label>精神</label>
        <button onclick="adjustStat('wis', -1)">-</button>
        <span id="wis">1</span>
        <button onclick="adjustStat('wis', 1)">+</button>
      </div>
      <div class="stat-row">
        <label>魅力</label>
        <button onclick="adjustStat('cha', -1)">-</button>
        <span id="cha">1</span>
        <button onclick="adjustStat('cha', 1)">+</button>
      </div>
    </div>
    <button onclick="startGame()">開始冒險</button>
  </div>

  <div id="game" class="container" style="display:none;">
    <h2>冒險中</h2>
    <!-- 顯示目前遭遇的怪物圖片 -->
    <div id="monsterImageContainer" style="margin-bottom:10px;">
      <img id="monsterImage" src="" alt="怪物" style="display:none;width:120px;height:120px;border:1px solid #ccc;border-radius:8px;">
    </div>
    <div id="playerInfo"></div>
    <div id="log"></div>
    <button onclick="saveGame()">儲存進度</button>
    <button onclick="exportGame()">匯出存檔</button>
    <input type="file" id="importFile" style="display:none;" onchange="importGame(event)">
    <button onclick="document.getElementById('importFile').click()">匯入存檔</button>
    <button id="rebornBtn" onclick="reborn()" style="display:none;">轉生</button>

    <h3>卡片系統</h3>
    <button onclick="drawCard()">抽卡（花費 50 Zeny）</button>
    <div id="cardCollection"></div>

    <h3>商店</h3>
    <button onclick="buyPotion()">買藥水（10 Zeny）</button>
    <button onclick="buyCardPack()">買卡包（50 Zeny）</button>

    <h3>世界對話</h3>
    <div id="chatLog" style="background:#f9f9f9;height:100px;overflow-y:auto;border:1px solid #ccc;padding:5px;margin-bottom:5px;"></div>
    <input id="chatInput" type="text" placeholder="輸入對話內容..." style="width:80%;">
    <button onclick="sendChat()">送出</button>
  </div>

  <script>
    // 定義職業的基礎數值
    const classes = {
      swordsman: {name: '劍士', base: {str: 4, dex: 2, con: 4, int: 1, wis: 1, cha: 1}},
      magician: {name: '魔法師', base: {str: 1, dex: 2, con: 2, int: 4, wis: 3, cha: 1}},
      acolyte: {name: '服事', base: {str: 2, dex: 2, con: 3, int: 3, wis: 3, cha: 1}},
      thief: {name: '盜賊', base: {str: 2, dex: 4, con: 2, int: 2, wis: 2, cha: 2}},
      archer: {name: '弓箭手', base: {str: 2, dex: 4, con: 2, int: 1, wis: 2, cha: 2}},
      merchant: {name: '商人', base: {str: 3, dex: 2, con: 3, int: 2, wis: 2, cha: 4}}
    };

    let availablePoints = 5;
    const stats = {str: 1, dex: 1, con: 1, int: 1, wis: 1, cha: 1};
    let player = null;
    let gameLoop = null;

    // 世界各地場景資料，取自官方介紹【205318362070147†L64-L79】
    const locations = ['普隆德拉', '斐揚', '艾爾貝塔', '夢羅克', '吉芬', '伊斯魯德'];
    // GM 隱藏模式按鍵序列暫存
    let gmSequence = [];

    function adjustStat(attr, delta) {
      if (delta > 0 && availablePoints > 0) {
        stats[attr] += delta;
        availablePoints -= delta;
      } else if (delta < 0 && stats[attr] > 1) {
        stats[attr] += delta;
        availablePoints += -delta;
      }
      document.getElementById(attr).textContent = stats[attr];
      document.getElementById('points').textContent = availablePoints;
    }

    function startGame() {
      const clsKey = document.getElementById('classSelect').value;
      const cls = classes[clsKey];
      // 計算總數值：基礎 + 自行分配
      const totalStats = {};
      for (const attr in stats) {
        totalStats[attr] = cls.base[attr] + stats[attr];
      }
      // 初始化玩家
      player = {
        classKey: clsKey,
        className: cls.name,
        stats: totalStats,
        level: 1,
        xp: 0,
        xpNext: 10,
        hp: 10 + totalStats.con * 2,
        hpMax: 10 + totalStats.con * 2,
        sp: 5 + totalStats.int,
        spMax: 5 + totalStats.int,
        zeny: 0,
        // 轉生次數
        reborn: 0,
        // 隱藏 GM 模式狀態
        gmMode: false,
        // 經驗值倍率（GM 模式啟動時調整）
        gmMultiplier: 1,
        // 冒險位置
        location: locations[Math.floor(Math.random() * locations.length)],
        // 卡片收集與藥水數量
        cards: [],
        potions: 0
      };

      document.getElementById('create').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      updatePlayerInfo();
      logMessage('冒險開始！你正在' + player.location + '周邊尋找魔物…');
      startLoop();
      // 初始化卡片顯示
      renderCardCollection();
    }

    function updatePlayerInfo() {
      const infoDiv = document.getElementById('playerInfo');
      infoDiv.innerHTML =
        `<p>職業: ${player.className} | 等級: ${player.level}` +
        (player.reborn > 0 ? ` (轉生${player.reborn}次)` : '') + `</p>` +
        `<p>位置: ${player.location}</p>` +
        `<p>經驗: ${player.xp.toFixed(1)} / ${player.xpNext}</p>` +
        `<p>HP: ${player.hp} / ${player.hpMax} | SP: ${player.sp} / ${player.spMax}</p>` +
        `<p>Zeny: ${player.zeny}</p>` +
        `<p>藥水: ${player.potions} | 卡片數: ${player.cards.length}</p>` +
        `<p>力量 ${player.stats.str}‧敏捷 ${player.stats.dex}‧體質 ${player.stats.con}‧智力 ${player.stats.int}‧精神 ${player.stats.wis}‧魅力 ${player.stats.cha}</p>`;
      // 顯示或隱藏轉生按鈕
      const rebornBtn = document.getElementById('rebornBtn');
      if (rebornBtn) {
        if (player.level >= 99) {
          rebornBtn.style.display = 'inline-block';
        } else {
          rebornBtn.style.display = 'none';
        }
      }
    }

    function logMessage(msg) {
      const logDiv = document.getElementById('log');
      logDiv.textContent += msg + '\n';
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 轉生功能：當等級達到 99，可重置等級並提升屬性
    function reborn() {
      if (!player || player.level < 99) return;
      player.reborn += 1;
      player.level = 1;
      player.xp = 0;
      player.xpNext = 10;
      // 基礎屬性全提升 1
      for (const attr in player.stats) {
        player.stats[attr] += 1;
      }
      // 更新血量與精力上限
      player.hpMax = 10 + player.stats.con * 2;
      player.spMax = 5 + player.stats.int;
      player.hp = player.hpMax;
      player.sp = player.spMax;
      // 清空金錢，符合轉生需清空負重的設定【943635084354851†L197-L205】
      player.zeny = 0;
      logMessage('你已轉生，所有能力提升！等級重置為 1。');
      updatePlayerInfo();
    }

    // 抽卡：花費 50 Zeny，隨機取得一張卡牌
    function drawCard() {
      const cost = 50;
      if (!player) return;
      if (player.zeny < cost) {
        logMessage('Zeny 不足，無法抽卡！');
        return;
      }
      player.zeny -= cost;
      // 隨機抽取卡片
      const card = cardsData[Math.floor(Math.random() * cardsData.length)];
      player.cards.push(card);
      logMessage(`你抽到了卡片：「${card.name}」（${card.rarity}）`);
      updatePlayerInfo();
      // 更新卡片欄顯示
      renderCardCollection();
    }

    // 更新卡片顯示區
    function renderCardCollection() {
      const colDiv = document.getElementById('cardCollection');
      if (!colDiv) return;
      colDiv.innerHTML = '';
      player.cards.forEach((card, idx) => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        cardEl.textContent = `${card.name} (${card.rarity})`;
        colDiv.appendChild(cardEl);
      });
    }

    // 購買藥水：每瓶 10 Zeny，立即增加藥水數量
    function buyPotion() {
      const price = 10;
      if (!player) return;
      if (player.zeny < price) {
        logMessage('Zeny 不足，無法購買藥水！');
        return;
      }
      player.zeny -= price;
      player.potions += 1;
      logMessage('購買了 1 瓶藥水。');
      updatePlayerInfo();
    }

    // 購買卡包：相當於抽三張卡
    function buyCardPack() {
      const cost = 50;
      if (!player) return;
      if (player.zeny < cost) {
        logMessage('Zeny 不足，無法購買卡包！');
        return;
      }
      player.zeny -= cost;
      logMessage('你購買了一個卡包，打開看看！');
      // 抽三張卡
      for (let i = 0; i < 3; i++) {
        const card = cardsData[Math.floor(Math.random() * cardsData.length)];
        player.cards.push(card);
        logMessage(`獲得卡片：「${card.name}」（${card.rarity}）`);
      }
      updatePlayerInfo();
      renderCardCollection();
    }

    // 處理聊天輸入
    function sendChat() {
      const inputEl = document.getElementById('chatInput');
      const chatLogEl = document.getElementById('chatLog');
      if (!inputEl || !chatLogEl) return;
      const text = inputEl.value.trim();
      if (!text) return;
      // 顯示玩家訊息
      chatLogEl.textContent += `你：${text}\n`;
      inputEl.value = '';
      // 取得 AI 回覆
      const reply = getAIResponse(text);
      chatLogEl.textContent += `世界：${reply}\n`;
      chatLogEl.scrollTop = chatLogEl.scrollHeight;
    }

    function getAIResponse(msg) {
      const lower = msg.toLowerCase();
      if (lower.includes('你好') || lower.includes('哈囉') || lower.includes('hello')) {
        return '你好，冒險者！';
      }
      if (lower.includes('名字')) {
        return '我是世界之聲。';
      }
      if (lower.includes('位置') || lower.includes('哪裡')) {
        return `你現在在 ${player.location}。`;
      }
      // 預設回覆
      const replies = ['祝你好運！', '冒險愉快！', '請小心怪物！', 'Zeny 要多存！', '力量與智謀同樣重要。'];
      return replies[Math.floor(Math.random() * replies.length)];
    }

    // 模擬隨機怪物，使用RO經典怪物
    const monsters = [

    // 卡牌資料，用於抽卡系統
    const cardsData = [
      { name: '火球術', description: '對敵人造成 5 點額外傷害', rarity: '普通' },
      { name: '治療術', description: '恢復自身 10 點生命', rarity: '普通' },
      { name: '雷擊', description: '對敵人造成 8 點額外傷害', rarity: '稀有' },
      { name: '防護罩', description: '提升 5 點防禦，持續一場戰鬥', rarity: '稀有' },
      { name: '怒吼', description: '提升 3 點攻擊力，持續三場戰鬥', rarity: '史詩' },
      { name: '神聖之光', description: '恢復全體生命並造成 6 點對敵傷害', rarity: '傳說' }
    ];

    let currentMonster = null;
    let monsterHP = 0;

    function startLoop() {
      gameLoop = setInterval(() => {
        if (!currentMonster) {
          // 產生新怪物
          currentMonster = monsters[Math.floor(Math.random() * monsters.length)];
          monsterHP = currentMonster.hp;
          logMessage(`遇到 ${currentMonster.name}！`);
          // 顯示怪物圖片
          const monsterImgEl = document.getElementById('monsterImage');
          if (monsterImgEl && currentMonster.img) {
            monsterImgEl.src = currentMonster.img;
            monsterImgEl.style.display = 'block';
          }
        }
        // 玩家攻擊
        const playerAtk = Math.max(1, Math.floor(player.stats.str / 2));
        monsterHP -= playerAtk;
        logMessage(`你對 ${currentMonster.name} 造成 ${playerAtk} 點傷害。`);
        if (monsterHP <= 0) {
          // 計算經驗與金錢獲取，考慮 GM 模式的倍率
          const xpGain = currentMonster.xp * player.gmMultiplier;
          const zenyGain = currentMonster.zeny * player.gmMultiplier;
          logMessage(`${currentMonster.name} 被擊敗了！獲得 ${xpGain} 經驗與 ${zenyGain} Zeny。`);
          player.xp += xpGain;
          player.zeny += zenyGain;
          currentMonster = null;
          // 隱藏怪物圖片
          const monsterImgEl2 = document.getElementById('monsterImage');
          if (monsterImgEl2) {
            monsterImgEl2.style.display = 'none';
          }
          checkLevelUp();
          // 有一定機率切換到新的地圖
          if (Math.random() < 0.3) {
            player.location = locations[Math.floor(Math.random() * locations.length)];
            logMessage('你來到了 ' + player.location + '！');
          }
          updatePlayerInfo();
          return;
        }
        // 怪物攻擊
        const monsterAtk = currentMonster.attack;
        player.hp -= monsterAtk;
        logMessage(`${currentMonster.name} 攻擊你，造成 ${monsterAtk} 點傷害。`);
        if (player.hp <= 0) {
          logMessage('你已經陣亡... 遊戲結束。');
          clearInterval(gameLoop);
        }
        updatePlayerInfo();
      }, 1000);
    }

    function checkLevelUp() {
      while (player.xp >= player.xpNext) {
        player.xp -= player.xpNext;
        player.level += 1;
        player.xpNext = Math.floor(player.xpNext * 1.5);
        // 每升級獲得增益
        player.hpMax += player.stats.con;
        player.spMax += player.stats.int;
        player.hp = player.hpMax;
        player.sp = player.spMax;
        logMessage(`恭喜！你升到了 ${player.level} 級，體力與精力完全恢復。`);
      }
      // 更新顯示（包括轉生按鈕）
      updatePlayerInfo();
      renderCardCollection();
    }

    function saveGame() {
      if (player) {
        localStorage.setItem('idleRagnarokSave', JSON.stringify(player));
        logMessage('遊戲進度已儲存到本地。');
      }
    }

    function exportGame() {
      if (!player) return;
      const data = JSON.stringify(player);
      const blob = new Blob([data], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'idle_ragnarok_save.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function importGame(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          player = data;
          // 確保某些欄位存在
          player.hp = Math.min(player.hp, player.hpMax);
          player.sp = Math.min(player.sp, player.spMax);
          document.getElementById('create').style.display = 'none';
          document.getElementById('game').style.display = 'block';
          updatePlayerInfo();
          renderCardCollection();
          logMessage('成功匯入遊戲進度，冒險繼續！');
          if (gameLoop) clearInterval(gameLoop);
          currentMonster = null;
          startLoop();
        } catch (err) {
          alert('匯入存檔失敗：' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // 載入已儲存的遊戲（若存在）
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('idleRagnarokSave');
      if (saved) {
        if (confirm('檢測到存在存檔，是否要載入?')) {
          player = JSON.parse(saved);
          document.getElementById('create').style.display = 'none';
          document.getElementById('game').style.display = 'block';
          updatePlayerInfo();
          renderCardCollection();
          logMessage('已載入之前的遊戲進度。');
          if (gameLoop) clearInterval(gameLoop);
          currentMonster = null;
          startLoop();
        }
      }
    });

    // 隱藏 GM 模式按鍵偵測：Ctrl+Shift+G 切換倍率
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'g') {
        if (player) {
          player.gmMode = !player.gmMode;
          player.gmMultiplier = player.gmMode ? 10 : 1;
          logMessage(player.gmMode ? 'GM 模式啟動！經驗與金錢獲取提升 10 倍！' : 'GM 模式已關閉。');
        }
      }
    });
  </script>
